name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DATABASE_URL: postgresql://localhost:5432/family-picnic-ci
  NEXTAUTH_URL: http://localhost:3000
  NEXTAUTH_SECRET: ci-secret-do-not-use
  AUTH_GOOGLE_ID: ci-placeholder
  AUTH_GOOGLE_SECRET: ci-placeholder

jobs:
  validate:
    runs-on: family-picnic-runner-set
    timeout-minutes: 15

    strategy:
      matrix:
        bun-version: [1.3]

    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.bun-version }}

      - run: bun install --frozen-lockfile

      - name: Type check
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Format check
        run: bun run format:check

      - name: Test
        run: bun run test

      - name: Prisma validate
        run: bun run db:validate

      - name: Build
        run: bun run build
