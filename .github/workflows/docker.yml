---
name: Docker

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: family-picnic-runner-set
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v5

      - name: Extract metadata
        id: meta
        run: |
          echo "tags=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          echo "labels=org.opencontainers.image.title=${{ github.repository }} \
            org.opencontainers.image.version=${{ github.ref_name }} \
            org.opencontainers.image.revision=${{ github.sha }} \
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}" >> $GITHUB_OUTPUT

      - name: Log in to Container Registry
        uses: redhat-actions/podman-login@v1
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        id: build
        uses: redhat-actions/buildah-build@v3
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          containerfiles: |
            ./Dockerfile
          platforms: linux/arm64

      - name: Push
        run: |
          buildah push \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tags }} \
            docker://${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tags }}

      - name: Image digest
        run: 'echo "Pushed with tag: ${{ steps.meta.outputs.tags }}"'
