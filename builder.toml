description = "Custom builder with kilterset/bun buildpack on Jammy base for Family Picnic Platform"
[[buildpacks]]
  id = "kilterset/bun"
  uri = "../heroku-bun-buildpack"
  version = "2.0.0"
[[buildpacks]]
  uri = "docker://docker.io/paketobuildpacks/procfile:5.13.4"
  version = "5.13.4"
[lifecycle]
  version = "0.21.12"
[[order]]
  [[order.group]]
    id = "kilterset/bun"
    version = "2.0.0"
[[order]]
  [[order.group]]
    id = "paketo-buildpacks/procfile"
    version = "5.13.4"
[stack]
  id = "io.buildpacks.stacks.jammy"
  build-image = "docker.io/paketobuildpacks/build-jammy-full:0.1.173"
  run-image = "index.docker.io/paketobuildpacks/run-jammy-full:latest"
