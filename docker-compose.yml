version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: family-picnic-postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: family-picnic
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U user -d family-picnic']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
